services:
  - name: frontend
    type: web
    runtime: docker
    plan: starter
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    healthCheckPath: /health
    autoDeploy: true

  - name: backend
    type: web
    runtime: docker
    plan: starter
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "3000"
      - key: DB_DIALECT
        value: mysql
      - key: DB_URI
        value: mysql://formics_write:change_me_write@mysql:3306/formics
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info

  - name: mysql
    type: pserv
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/mysql/Dockerfile
    dockerContext: .
    autoDeploy: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_DATABASE
        value: formics
      - key: MYSQL_USER
        value: formics_write
      - key: MYSQL_PASSWORD
        value: change_me_write
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
